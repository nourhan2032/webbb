<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Navigation | SmartPark AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Urbanist:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="navigationStyle.css">
</head>
<body class="nav-body">

    <div class="nav-wrapper">
        <div id="nav-top-bar">
            <i class="fa-solid fa-diamond-turn-right nav-turn-icon"></i>
            <span id="nav-instruction">Detecting location and calculating route...</span>
        </div>

        <div id="map"></div>

        <div id="nav-bottom-bar" dir="ltr">
            <div class="nav-info">
                <span id="nav-res-time" class="nav-time">-- mins</span>
                <span id="nav-res-dist" class="nav-dist">(-- m)</span>
            </div>
            <button class="end-trip-btn" onclick="exitNavigation()">
                <i class="fa-solid fa-circle-xmark"></i> End Trip
            </button>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCQc2Wo2wUhURa77XlW4rJdpQ3_v5ZpncM&callback=initNavigationMap" async defer></script>
    
    <script src="navigation.js"></script> 
</body>
</html>
